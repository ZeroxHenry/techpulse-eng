{{ define "main" }}
<article class="radar-page">
  <div class="radar-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}
    <p class="radar-subtitle">{{ . }}</p>
    {{ end }}
    {{ with .Params.edition }}
    <span class="radar-date">{{ . }}</span>
    {{ end }}
  </div>

  {{ .Content }}

  <div class="radar-filters" id="radar-filters">
    <button class="radar-filter-btn active" data-quadrant="all">All</button>
    <button class="radar-filter-btn radar-filter-q0" data-quadrant="0">AI &amp; ML</button>
    <button class="radar-filter-btn radar-filter-q1" data-quadrant="1">Cloud &amp; Infra</button>
    <button class="radar-filter-btn radar-filter-q2" data-quadrant="2">Dev Tools</button>
    <button class="radar-filter-btn radar-filter-q3" data-quadrant="3">Platforms &amp; APIs</button>
    <span class="radar-filter-divider"></span>
    <button class="radar-filter-btn" data-ring="0">Adopt</button>
    <button class="radar-filter-btn" data-ring="1">Trial</button>
    <button class="radar-filter-btn" data-ring="2">Assess</button>
    <button class="radar-filter-btn" data-ring="3">Hold</button>
  </div>

  <div class="radar-container">
    <div id="tech-radar" data-source="/data/radar/2026-q2.json"></div>
    <div class="radar-sidebar">
      <div id="radar-blip-list"></div>
      <div id="radar-legend"></div>
    </div>
  </div>
</article>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="/js/radar.js"></script>
{{ end }}
