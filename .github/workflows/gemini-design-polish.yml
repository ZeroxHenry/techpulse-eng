name: Gemini Design Polish

# Disabled — re-enable when API keys are configured
on:
  workflow_dispatch:

jobs:
  design-polish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Gemini design polish
        uses: google-github-actions/run-gemini-cli@v0
        with:
          prompt: Polish design and CSS.
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
