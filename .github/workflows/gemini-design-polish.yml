name: Gemini Design Polish

on:
  schedule:
    - cron: "0 17 * * 3,6" # 수/토 02:00 KST (17:00 UTC)
  workflow_dispatch:

jobs:
  design-polish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Gemini CLI
        run: npm install -g @anthropic-ai/gemini-cli || npm install -g @google/gemini-cli

      - name: Run Gemini design polish
        uses: google-github-actions/run-gemini-cli@v1
        with:
          prompt: |
            You are the design polish agent for techblips.com (Hugo + PaperMod).
            Read GEMINI.md for all project rules and file structure.

            This week's design tasks (pick 2-3 and do them well):

            1. assets/css/extended/custom.css — improve post card hover interactions
            2. static/css/radar.css — blip hover effects, filter button styles
            3. Dark mode radar visibility improvements
            4. Mobile responsive below 860px layout fixes
            5. Newsletter subscription form styling
            6. Typography and spacing refinements

            Rules:
            - Do NOT touch themes/ folder
            - Follow CSS variable system in GEMINI.md
            - Keep changes minimal and focused
            - Test dark mode compatibility
            - English commit messages only
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "style: weekly design polish by Gemini"
          branch: design-polish/${{ github.run_id }}
          title: "[Design] Weekly polish — auto"
          body: |
            ## Design Polish

            Gemini CLI automated design improvements.
            Review CSS changes for visual quality and dark mode compatibility.
