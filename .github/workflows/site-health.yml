name: Weekly Site Health Check

on:
  schedule:
    - cron: "0 0 * * 5" # 매주 금요일 09:00 KST (00:00 UTC)
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build site
        run: hugo --minify 2>&1 | tee build-output.txt

      - name: Check for build errors
        run: |
          if grep -i "error" build-output.txt; then
            echo "BUILD_ERRORS=true" >> $GITHUB_ENV
          else
            echo "BUILD_ERRORS=false" >> $GITHUB_ENV
          fi

      - name: AI site review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the site health checker for 0xhenry.dev (Hugo + PaperMod).

            Check the following and create a GitHub Issue:

            1. Read build-output.txt for any Hugo warnings or errors
            2. Check all .md files in content/posts/ for:
               - Missing frontmatter fields (title, date, description)
               - Description longer than 160 characters
               - Broken internal links (links to /posts/ or /radar/ that don't exist)
            3. Check static/data/radar/*.json for valid JSON
            4. Check if data/radar/ and static/data/radar/ are in sync
            5. Count total posts, radar blips, and estimate site size

            Create a GitHub Issue titled: 🏥 Weekly Health — YYYY-MM-DD

            Format:
            ## Hugo 빌드
            - (pass/fail + any warnings)

            ## 콘텐츠 체크
            - 총 포스트: N개
            - 총 레이더 블립: N개
            - 문제 발견: (list or "없음")

            ## 데이터 정합성
            - radar JSON 동기화: (OK or 불일치)

            ## 추천 개선
            - (1-2 actionable items)
