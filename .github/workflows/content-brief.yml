name: Weekly Content Brief

# Disabled — re-enable when API keys are configured
on:
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate content briefs with AI
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: Analyze tech trends and suggest 3 article topics.
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat: add weekly content brief"
          branch: content-brief/${{ github.run_id }}
          title: "[Brief] Weekly content suggestions"
