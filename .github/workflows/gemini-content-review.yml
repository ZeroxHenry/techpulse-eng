name: Gemini Content Review

on:
  schedule:
    - cron: "0 18 * * 1" # 매주 월 03:00 KST (18:00 UTC)
  workflow_dispatch:

jobs:
  content-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Run Gemini content review
        uses: google-github-actions/run-gemini-cli@v0
        with:
          prompt: |
            You are the content quality reviewer for 0xhenry.dev (Hugo + PaperMod).
            Read GEMINI.md for all project rules.

            Review 3-5 posts in content/posts/ and improve quality:

            1. Fix AI-sounding sentences (generic phrases, robotic tone)
            2. Shorten overly long introductions
            3. Verify code example accuracy
            4. Ensure description is under 150 characters
            5. Check tags are 3-4 per post (not 7-8)
            6. Fix broken internal links

            Rules:
            - Do NOT create new posts
            - Do NOT rename files
            - Do NOT change post dates
            - Keep the author's voice and opinions
            - English commit messages only
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "content: weekly quality review by Gemini"
          branch: content-review/${{ github.run_id }}
          title: "[Content] Weekly quality review — auto"
          body: |
            ## Content Review

            Gemini CLI automated content quality improvements.
            Review changes to ensure they maintain the author's voice.
