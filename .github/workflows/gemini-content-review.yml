name: Gemini Content Review

# Disabled — re-enable when API keys are configured
on:
  workflow_dispatch:

jobs:
  content-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Gemini content review
        uses: google-github-actions/run-gemini-cli@v0
        with:
          prompt: Review content quality.
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
