name: Quarterly Radar Update

# Disabled — re-enable when API keys are configured
on:
  workflow_dispatch:

jobs:
  suggest-radar-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Analyze radar
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: Suggest radar blip movements.
