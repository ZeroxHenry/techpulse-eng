name: Auto-Generate Content

# Disabled — re-enable when API keys are configured
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Generate content with AI
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are writing a blog post for 0xHenry (0xhenry.dev).
            Author: Henry. Style: conversational, opinionated, developer-focused.
            Research a trending AI/dev-tools topic from the last 48 hours.
            Create a markdown file in content/posts/ with proper frontmatter.

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Auto-publish article"
          branch: auto-content/${{ github.run_id }}
          title: "[Auto] New article"
          body: "Auto-generated content for review."
