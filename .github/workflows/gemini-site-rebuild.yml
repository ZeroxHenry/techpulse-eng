name: Gemini Site Rebuild

# Disabled — re-enable when API keys are configured
on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Gemini rebuild
        uses: google-github-actions/run-gemini-cli@v0
        with:
          prompt: Rebuild site design.
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
