baseURL = "https://techblips.com/"
languageCode = "en-us"
title = "TechBlips"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  mainSections = ["posts"]
  env = "production"
  description = "AI, tech trends, and the future — explained fast. Quick tech blips on Claude updates, breakthrough tools, and the tech that matters."
  author = "Henry"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false
  defaultTheme = "light"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "The Pulse of Modern Engineering"
    Content = "Deep dives into AI, high-performance infrastructure, and the tools shaping the future of software. No fluff, just the engineering that matters."


  [params.label]
    text = "TechBlips"
    icon = "/logo.svg"
    iconHeight = 35

[params.assets]
  disableFingerprinting = false

[params.cover]
  hiddenInList = false
  hiddenInSingle = false

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  threshold = 0.4

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/posts/"
    weight = 20
  [[menu.main]]
    identifier = "radar"
    name = "Radar"
    url = "/radar/current/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false
  [markup.highlight]
    style = "dracula"
    lineNos = false
    codeFences = true

[sitemap]
  changefreq = "daily"
  priority = 0.5

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
