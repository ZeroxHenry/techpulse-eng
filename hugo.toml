baseURL = "https://techblips.com/"
languageCode = "en-us"
title = "TechBlips"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "AI, tech trends, and the future — explained fast. Quick tech blips on Claude updates, breakthrough tools, and the tech that matters."
  author = "Henry"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false
  defaultTheme = "auto"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "TechBlips"
    Content = "Quick blips on AI breakthroughs, dev tools, and tech that actually matters. No fluff — just the signal."

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[params.assets]
  disableFingerprinting = false

[params.cover]
  hiddenInList = false
  hiddenInSingle = false

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  threshold = 0.4

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 20
  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    codeFences = true

[sitemap]
  changefreq = "daily"
  priority = 0.5

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
